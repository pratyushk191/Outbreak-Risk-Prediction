version: "3.9"

services:
  api:
    build: .
    container_name: outbreak_api
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs   # persist trained model + predictions between runs
    command: uvicorn api_app:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  dashboard:
    build: .
    container_name: outbreak_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./outputs:/app/outputs
    command: python3 -m streamlit run dashboard.py --server.address 0.0.0.0 --server.port 8501
    depends_on:
      - api
    restart: unless-stopped
